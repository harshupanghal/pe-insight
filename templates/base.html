<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}PE Insight{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <a href="{{ url_for('index') }}" class="brand-link">
                <div class="brand-mark"></div>
                <div>
                    <!-- <div class="brand-overline">Portable Executable Analysis</div> -->
                    <h1 class="brand-title">PE Insight</h1>
                </div>
            </a>
            <div class="header-meta">Static triage for EXE and DLL files</div>
        </header>

        <main class="app-main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
